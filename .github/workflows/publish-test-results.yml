---
name: Publish Test Results

on: [workflow_call]  # yamllint disable-line rule:truthy

jobs:
  publish:
    name: Publish Test Results
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Download test artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts/tests/output
          pattern: 'test-results-*'  # Adjust the pattern to match your test result files

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action/linux@d0a4676d0e0b938bc201470d88276b7c74c712b3
        if: ${{ success() || failure() }}
        with:
          files: artifacts/tests/output/**/*.trx  # Path to downloaded test results
          large_files: true  # Allows handling large test result files
          check_name: Test results  # Name for the GitHub report
          report_individual_runs: true  # Shows individual test run details
          action_fail: false  # Fails the job if test failures are detected
          time_unit: milliseconds  # Ensures precise reporting of test duration
          compare_to_earlier_commit: true  # Enables comparison with previous commits
